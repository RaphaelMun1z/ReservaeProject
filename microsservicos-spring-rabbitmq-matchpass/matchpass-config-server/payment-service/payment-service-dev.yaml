spring:
  datasource:
    url: jdbc:postgresql://localhost:5436/db_payment
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  payment:
    success-url: ${PAY_SUCCESS_URL:http://localhost:4200/payment/success}
    cancel-url: ${PAY_CANCEL_URL:http://localhost:4200/payment/cancel}

matchpass:
  config:
    kafka:
      server-url: localhost:29092
      consumer-group: payment-service
      topics:
        pagamento-solicitado: matchpass.payment.requested.v1
        sessao-pagamento-criada: matchpass.payment.session-created.v1
        pagamento-aprovado: matchpass.payment.approved.v1
        pagamento-falhou: matchpass.payment.failed.v1