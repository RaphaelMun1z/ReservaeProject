spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/db_order}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

feign:
  client:
    config:
      inventory-service:
        connectTimeout: 5000
        readTimeout: 5000
      payment-service:
        connectTimeout: 5000
        readTimeout: 5000