server:
  port: 8100

spring:
  application:
    name: inventory-service
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    config:
      profile: dev
  data:
    redis:
      host: localhost
      port: 6379

event-catalog:
  service:
    url: http://localhost:8080

feign:
  client:
    config:
      event-catalog-service:
        connectTimeout: 5000
        readTimeout: 5000

springdoc:
  pathsToMatch: /**
  swagger-ui:
    use-root-path: true