<!doctype html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Music Tour - Seleção de Setor</title>

        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="styles/sector-selection.css" />
    </head>
    <body data-page="event-sectors">

        <nav class="nav">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 100 100" fill="none">
                    <path d="M50 8L88 82H12L50 8Z" stroke="white" stroke-width="6"/>
                    <path d="M50 25L70 65H30L50 25Z" stroke="white" stroke-width="4"/>
                </svg>
            </a>

            <div class="nav-center">
                <a href="club-vip.html" aria-label="Club VIP"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></a>
                <a href="shows.html" class="active" aria-label="Tickets"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path></svg></a>
                <a href="my-tickets.html" aria-label="Minha Carteira"><svg viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg></a>
            </div>

            <div class="nav-right">
                <div class="location">
                    <span class="flag"></span>
                    <span>Brasil</span>
                </div>
                <div class="user-profile" id="btn-login-trigger">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="menu" id="hamburger-menu">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>

        <main class="sector-container">
            <header class="page-header">
                <h1 class="page-title">SELECIONE O SEU SETOR</h1>
                <p class="page-subtitle"></p>
            </header>
            <div class="main-grid">
                <div class="arena-map">
                    <div class="map-stage">PALCO</div>
                </div>

                <div class="ticket-list"></div>
            </div>
        </main>

        <div class="sticky-checkout" id="checkout-bar">
            <div class="sc-info">
                <span class="sc-total-label">Total da Compra (<span id="total-qty">0</span> bilhetes)</span>
                <span class="sc-total-price">$<span id="total-price">0</span>,00</span>
            </div>
            <a href="checkout.html" style="text-decoration: none;">
                <button class="btn-avancar">
                    Avançar
                    <svg viewBox="0 0 24 24"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                </button>
            </a>
        </div>

        <script src="scripts/sector-selection-01.js"></script>
        <link rel="stylesheet" href="styles/toast.css" />
        <link rel="stylesheet" href="styles/skeleton.css" />
        <script src="scripts/script>
    </body>
</html>
