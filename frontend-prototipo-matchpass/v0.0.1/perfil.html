<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MatchPass — Perfil</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow: auto; }
    .app-shell { grid-template-columns: var(--sidebar-w) 1fr; }
    .main-content { grid-column: 2; overflow: auto; }
  </style>
</head>
<body>

<div class="app-shell" style="grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--nav-h) 1fr;">

  <header class="topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82zM7 7H7.01" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="topbar-center">
      <span class="topbar-wordmark">Match<span>Pass</span></span>
    </div>
    <div class="topbar-right">
      <a class="topbar-avatar" href="perfil.html">
        <div class="avatar-ring">RM</div>
        <span class="avatar-name">Rodrigo M.</span>
      </a>
    </div>
  </header>

  <nav class="sidenav">
    <a class="sidenav-link" href="index.html" data-tip="Jogos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
    </a>
    <a class="sidenav-link" href="meus-ingressos.html" data-tip="Meus Ingressos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82zM7 7H7.01"/>
      </svg>
    </a>
    <a class="sidenav-link" href="#" data-tip="Times">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 15a7 7 0 100-14 7 7 0 000 14zM8.21 13.89L7 23l5-3 5 3-1.21-9.12"/>
      </svg>
    </a>
    <div class="sidenav-spacer"></div>
    <a class="sidenav-link active" href="perfil.html" data-tip="Perfil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
      </svg>
    </a>
  </nav>

  <main class="main-content">
    <div class="profile-page">
      <h1 class="page-title">Perfil</h1>

      <div class="profile-card">
        <div class="profile-avatar">RM</div>
        <div class="profile-name">Rodrigo Martins</div>
        <div class="profile-email">rodrigo@email.com</div>
      </div>

      <div class="profile-card">
        <div class="section-label" style="margin-bottom:18px">
          <div class="section-label-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/>
            </svg>
          </div>
          <h2>Dados pessoais</h2>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nome completo</label>
            <input type="text" value="Rodrigo Martins">
          </div>
          <div class="form-group">
            <label>E-mail</label>
            <input type="email" value="rodrigo@email.com">
          </div>
          <div class="form-group">
            <label>CPF</label>
            <input type="text" value="123.456.789-09" maxlength="14">
          </div>
          <div class="form-group">
            <label>Telefone</label>
            <input type="tel" value="(13) 99999-2026">
          </div>
        </div>
        <div style="margin-top:20px;display:flex;justify-content:flex-end">
          <button class="btn-sm primary" onclick="showToast('Dados salvos com sucesso!')">Salvar alterações</button>
        </div>
      </div>

      <div class="profile-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-weight:700;color:var(--black);margin-bottom:4px">Alterar senha</div>
            <div style="font-size:13px;color:var(--muted)">Última alteração: nunca</div>
          </div>
          <button class="btn-sm secondary">Alterar</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>
<script src="cart.js"></script>
<script>
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
</body>
</html>
