<!doctype html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Tour - 404 Página Não Encontrada</title>

    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#ff624d',
                            dark: '#e04c38',
                        },
                        dark: {
                            bg: '#050505',
                            card: '#101010',
                            border: '#242424',
                            hover: '#1a1a1a'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Efeito de ruído sutil de fundo */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: repeating-radial-gradient(circle at 0 0, #fff 0, #fff 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 50;
        }

        /* Animação suave de flutuação para o ícone principal */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 5s ease-in-out infinite;
        }

        /* Brilho pulsante atrás do 404 */
        @keyframes pulse-glow {
            0% { opacity: 0.2; transform: scale(0.9); }
            50% { opacity: 0.4; transform: scale(1.1); }
            100% { opacity: 0.2; transform: scale(0.9); }
        }
        .glow-bg {
            animation: pulse-glow 4s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-100 font-sans antialiased h-screen flex flex-col selection:bg-brand selection:text-white overflow-hidden">

    <!-- Header Simples -->
    <header class="relative z-40 px-8 py-6">
        <a href="index.html" class="inline-flex items-center justify-center w-12 h-12 bg-brand rounded-full text-white font-black text-xl tracking-tighter shadow-[0_0_15px_rgba(255,98,77,0.3)] hover:scale-105 transition-transform">
            tkts
        </a>
    </header>

    <!-- Main Content 404 -->
    <main class="flex-1 flex items-center justify-center relative z-10 px-6">
        
        <!-- Glow Element -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-brand/20 rounded-full blur-[120px] pointer-events-none glow-bg"></div>

        <div class="text-center max-w-2xl relative">
            <!-- Ícone flutuante -->
            <div class="flex justify-center mb-6 animate-float">
                <div class="relative w-32 h-32 bg-dark-card border border-dark-border rounded-full flex items-center justify-center shadow-2xl">
                    <i class="ph-duotone ph-ghost text-7xl text-gray-400"></i>
                    <!-- Detalhe em vermelho -->
                    <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-brand rounded-full flex items-center justify-center border-4 border-dark-bg">
                        <i class="ph-bold ph-question text-white text-lg"></i>
                    </div>
                </div>
            </div>

            <!-- Título 404 -->
            <h1 class="text-8xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-600 tracking-tighter mb-4 drop-shadow-lg">
                404
            </h1>
            
            <h2 class="text-2xl md:text-3xl font-bold text-white mb-4 tracking-tight">
                Fora do Palco!
            </h2>
            
            <p class="text-gray-400 font-medium text-lg mb-10 leading-relaxed">
                Parece que você se perdeu no recinto do festival. O espetáculo ou página que você está procurando não existe ou mudou de endereço.
            </p>
            
            <!-- Botões de Ação -->
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto bg-brand hover:bg-brand-dark text-white px-8 py-4 rounded-xl font-bold transition-all transform hover:-translate-y-1 shadow-[0_10px_20px_rgba(255,98,77,0.2)] flex items-center justify-center gap-2">
                    <i class="ph-bold ph-house text-lg"></i>
                    Voltar ao Início
                </a>
                
                <a href="#" onclick="window.history.back();" class="w-full sm:w-auto bg-dark-card border border-dark-border text-gray-300 hover:text-white hover:border-gray-500 px-8 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                    <i class="ph-bold ph-arrow-left text-lg"></i>
                    Página Anterior
                </a>
            </div>
        </div>

    </main>

    <!-- Decoração de rodapé discreta -->
    <div class="absolute bottom-6 w-full text-center z-10">
        <p class="text-xs text-gray-600 font-semibold uppercase tracking-widest">Erro de Navegação • Music Tour</p>
    </div>

</body>
</html>
