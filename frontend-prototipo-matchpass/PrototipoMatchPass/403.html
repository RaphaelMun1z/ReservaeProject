<!doctype html>
<html lang="pt-PT" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Tour - 403 Acesso Restrito</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            DEFAULT: '#ff624d',
                            dark: '#e04c38',
                        },
                        dark: {
                            bg: '#050505',
                            card: '#101010',
                            border: '#242424',
                            hover: '#1a1a1a'
                        },
                        danger: {
                            DEFAULT: '#ef4444', /* Vermelho alerta para acesso negado */
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Efeito de ruído sutil de fundo */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            opacity: 0.03;
            background-image: repeating-radial-gradient(circle at 0 0, #fff 0, #fff 1px, transparent 1px, transparent 4px);
            pointer-events: none;
            z-index: 50;
        }

        /* Animação de abalo (shake) simulando uma porta trancada */
        @keyframes lock-shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px) rotate(-2deg); }
            40% { transform: translateX(5px) rotate(2deg); }
            60% { transform: translateX(-5px) rotate(-2deg); }
            80% { transform: translateX(5px) rotate(2deg); }
        }
        .animate-shake {
            animation: lock-shake 0.5s ease-in-out;
        }
        .group:hover .animate-shake-hover {
            animation: lock-shake 0.4s ease-in-out;
        }

        /* Brilho estático de alerta */
        .glow-alert {
            box-shadow: 0 0 80px 20px rgba(239, 68, 68, 0.15);
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-100 font-sans antialiased h-screen flex flex-col selection:bg-danger selection:text-white overflow-hidden">

    <header class="relative z-40 px-8 py-6">
        <a href="index.html" class="inline-flex items-center justify-center w-12 h-12 bg-dark-card border border-dark-border rounded-full text-white font-black text-xl tracking-tighter hover:border-danger/50 transition-colors">
            tkts
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center relative z-10 px-6">
        
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[350px] h-[350px] bg-danger/20 rounded-full blur-[100px] pointer-events-none"></div>

        <div class="text-center max-w-2xl relative group">
            <div class="flex justify-center mb-6">
                <div class="relative w-32 h-32 bg-dark-card border border-dark-border rounded-full flex items-center justify-center shadow-2xl transition-colors group-hover:border-danger/40 glow-alert animate-shake-hover cursor-not-allowed">
                    <i class="ph-duotone ph-lock-key text-7xl text-gray-400 group-hover:text-danger transition-colors"></i>
                    <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-danger rounded-full flex items-center justify-center border-4 border-dark-bg">
                        <i class="ph-bold ph-hand-palm text-white text-lg"></i>
                    </div>
                </div>
            </div>

            <h1 class="text-8xl md:text-9xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-600 tracking-tighter mb-4 drop-shadow-lg">
                403
            </h1>
            
            <h2 class="text-2xl md:text-3xl font-bold text-white mb-4 tracking-tight">
                Acesso Restrito ao Backstage
            </h2>
            
            <p class="text-gray-400 font-medium text-lg mb-10 leading-relaxed">
                Alto lá! Não tens a credencial necessária para entrar nesta área. Se acreditas que isto é um engano, verifica se tens a sessão iniciada com a conta correta.
            </p>
            
            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto bg-dark-card border border-dark-border text-gray-300 hover:text-white hover:border-gray-500 px-8 py-4 rounded-xl font-bold transition-all flex items-center justify-center gap-2">
                    <i class="ph-bold ph-house text-lg"></i>
                    Voltar ao Início
                </a>

                <button onclick="document.getElementById('login-modal').classList.add('flex'); document.getElementById('login-modal').classList.remove('hidden');" class="w-full sm:w-auto bg-white text-black hover:bg-gray-200 px-8 py-4 rounded-xl font-bold transition-all transform hover:-translate-y-1 shadow-[0_10px_20px_rgba(255,255,255,0.1)] flex items-center justify-center gap-2">
                    <i class="ph-bold ph-user-circle text-lg"></i>
                    Mudar de Conta
                </button>
            </div>
        </div>

    </main>

    <div class="absolute bottom-6 w-full text-center z-10 flex flex-col items-center justify-center gap-1">
        <p class="text-xs text-gray-600 font-semibold uppercase tracking-widest">Forbidden • Music Tour</p>
        <p class="text-[10px] text-danger/70 font-mono flex items-center gap-1">
            ACCESS_DENIED_MISSING_PERMISSIONS
        </p>
    </div>

    <div id="login-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/80 backdrop-blur-sm">
        <div class="bg-dark-card border border-dark-border p-8 rounded-2xl w-full max-w-sm relative">
            <button onclick="document.getElementById('login-modal').classList.add('hidden'); document.getElementById('login-modal').classList.remove('flex');" class="absolute top-4 right-4 text-gray-500 hover:text-white">
                <i class="ph-bold ph-x text-xl"></i>
            </button>
            <h3 class="text-xl font-bold text-white mb-6">Iniciar Sessão</h3>
            <input type="email" placeholder="E-mail" class="w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-3 text-white mb-3 focus:outline-none focus:border-brand">
            <input type="password" placeholder="Palavra-passe" class="w-full bg-dark-bg border border-dark-border rounded-xl px-4 py-3 text-white mb-6 focus:outline-none focus:border-brand">
            <button class="w-full bg-brand text-white font-bold rounded-xl py-3 hover:bg-brand-dark transition-colors">Entrar</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const iconContainer = document.querySelector('.group .relative.w-32');
            if(iconContainer) {
                // Dispara o shake 1 segundo após o carregamento para chamar a atenção
                setTimeout(() => {
                    iconContainer.classList.add('animate-shake');
                    setTimeout(() => {
                        iconContainer.classList.remove('animate-shake');
                    }, 500);
                }, 800);
            }
        });
    </script>
</body>
</html>
