<!doctype html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Music Tour - Transferir Ingresso</title>

        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }

            :root {
                --bg: #050505; --card: #0d0d0d; --red: #ff624d;
                --white: #fff; --gray: #a7a7a7; --green: #00e676;
            }

            body {
                min-height: 100vh;
                background: radial-gradient(circle at top center, #1f0b09 0%, var(--bg) 50%, #000000 100%);
                font-family: "Montserrat", sans-serif;
                color: white;
            }

            /* Container */
            .transfer-container {
                max-width: 600px;
                margin: 40px auto;
                padding: 0 20px;
            }

            .back-link {
                display: flex; align-items: center; gap: 8px; color: var(--gray);
                text-decoration: none; font-size: 14px; margin-bottom: 30px;
            }

            .glass-box {
                background: rgba(15, 15, 15, 0.6);
                backdrop-filter: blur(20px);
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 20px;
                padding: 40px;
            }

            .title { font-size: 28px; font-weight: 900; margin-bottom: 10px; }
            .subtitle { font-size: 14px; color: var(--gray); margin-bottom: 30px; }

            .form-group { margin-bottom: 20px; }
            .label { font-size: 12px; color: var(--gray); text-transform: uppercase; margin-bottom: 8px; display: block; }
            
            .input-field {
                width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.03);
                border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
                color: white; font-family: inherit; outline: none;
            }

            .btn-action {
                width: 100%; background: var(--red); color: white; border: none;
                padding: 16px; border-radius: 12px; font-weight: 800; cursor: pointer;
                transition: transform 0.2s, background 0.2s; margin-top: 10px;
            }
            .btn-action:hover { transform: translateY(-2px); background: var(--red-dark); }

            /* Alerta de Segurança */
            .security-notice {
                margin-top: 30px; padding: 20px;
                background: rgba(255, 98, 77, 0.05); border: 1px solid rgba(255, 98, 77, 0.1);
                border-radius: 12px; font-size: 12px; color: var(--gray);
            }
            .security-notice strong { color: var(--red); }
        </style>
    </head>
    <body>

        <main class="transfer-container">
            <a href="meus-ingressos.html" class="back-link">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Cancelar e voltar
            </a>

            <div class="glass-box">
                <h1 class="title">Transferir Ingresso</h1>
                <p class="subtitle">Envia o teu ingresso <strong>"De Bar em Bar 10"</strong> para um amigo de forma segura.</p>

                <form id="transfer-form">
                    <div class="form-group">
                        <label class="label">E-mail do Destinatário</label>
                        <input type="email" class="input-field" placeholder="amigo@email.com" required>
                    </div>

                    <div class="form-group">
                        <label class="label">Confirmar Palavra-passe</label>
                        <input type="password" class="input-field" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-action">Confirmar Transferência</button>
                </form>

                <div class="security-notice">
                    <strong>Atenção:</strong> Ao confirmar, este ingresso será removido permanentemente da sua carteira e enviado para o destinatário. Esta ação é irreversível.
                </div>
            </div>
        </main>

        <script>
            document.getElementById('transfer-form').addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Transferência solicitada com sucesso! O destinatário receberá um e-mail de confirmação.');
                window.location.href = 'meus-ingressos.html';
            });
        </script>
    </body>
</html>
