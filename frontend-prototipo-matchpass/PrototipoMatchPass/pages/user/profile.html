<!doctype html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Music Tour - O Meu Perfil</title>

        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../../src/styles/user/profile.css" />
    </head>
    <body data-api-page="user-profile">

        <nav class="nav">
            <a href="../../index.html" class="logo">
                <svg viewBox="0 0 100 100" fill="none"><path d="M50 8L88 82H12L50 8Z" stroke="white" stroke-width="6"/><path d="M50 25L70 65H30L50 25Z" stroke="white" stroke-width="4"/></svg>
            </a>

            <div class="nav-center">
                <a href="../public/club-vip.html" aria-label="Club VIP"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg></a>
                <a href="../public/shows.html" aria-label="Bilhetes"><svg viewBox="0 0 24 24"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path></svg></a>
                <a href="my-tickets.html" aria-label="A Minha Carteira"><svg viewBox="0 0 24 24"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg></a>
            </div>

            <div class="nav-right">
                <div class="location"><span class="flag"></span><span>Portugal</span></div>
                <div class="user-profile">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="menu" id="hamburger-menu">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </nav>

        <main class="profile-container">
            <header class="page-header">
                <h1 class="page-title">A MINHA CONTA</h1>
                <p class="page-subtitle">Gira as tuas informações pessoais, segurança e métodos de pagamento.</p>
            </header>

            <div class="profile-grid">
                
                <aside class="sidebar">
                    <div class="user-snapshot">
                        <div class="avatar-wrapper">
                            <img data-user-avatar alt="Avatar do Utilizador">
                            <div class="edit-avatar">
                                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </div>
                        </div>
                        <h3 data-user-name></h3>
                        <p data-user-email></p>
                    </div>

                    <div class="nav-tabs">
                        <button class="nav-tab active" data-target="tab-dados">
                            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            Dados Pessoais
                        </button>
                        <button class="nav-tab" data-target="tab-seguranca">
                            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            Segurança
                        </button>
                        <button class="nav-tab" data-target="tab-pagamentos">
                            <svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
                            Métodos de Pagamento
                        </button>
                        <button class="nav-tab" data-target="tab-historico">
                            <svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"></polyline><circle cx="12" cy="12" r="10"></circle></svg>
                            Histórico de Compras
                        </button>
                    </div>
                </aside>

                <section class="content-area">
                    
                    <div id="tab-dados" class="tab-content active">
                        <h2 class="section-title">Dados Pessoais</h2>
                        <div class="form-grid">
                            <div class="form-group">
                                <label class="form-label">Nome Completo</label>
                                <input type="text" name="name" class="input-field" value="">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Endereço de E-mail</label>
                                <input type="email" name="email" class="input-field" value="">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Telemóvel</label>
                                <input type="tel" name="phone" class="input-field" value="">
                            </div>
                            <div class="form-group">
                                <label class="form-label">NIF / Documento</label>
                                <input type="text" class="input-field" value="123456789" disabled>
                            </div>
                        </div>
                        <button class="btn-action">Guardar Alterações</button>
                    </div>

                    <div id="tab-seguranca" class="tab-content">
                        <h2 class="section-title">Alterar Palavra-passe</h2>
                        <div class="form-grid">
                            <div class="form-group full">
                                <label class="form-label">Palavra-passe Atual</label>
                                <input type="password" class="input-field" placeholder="••••••••">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Nova Palavra-passe</label>
                                <input type="password" class="input-field" placeholder="••••••••">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Confirmar Nova Palavra-passe</label>
                                <input type="password" class="input-field" placeholder="••••••••">
                            </div>
                        </div>
                        <button class="btn-action">Atualizar Palavra-passe</button>
                    </div>

                    <div id="tab-pagamentos" class="tab-content">
                        <h2 class="section-title">Cartões Guardados</h2>
                        <div class="cards-grid">
                            <div class="credit-card">
                                <div class="cc-header">
                                    <div class="cc-brand">
                                        <svg viewBox="0 0 24 24"><circle cx="7" cy="12" r="7" fill="#EB001B"></circle><circle cx="17" cy="12" r="7" fill="#F79E1B" opacity="0.8"></circle></svg>
                                    </div>
                                    <button class="cc-delete" aria-label="Remover Cartão">
                                        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                    </button>
                                </div>
                                <div class="cc-number"></div>
                                <div class="cc-footer">
                                    <div>Nome <strong></strong></div>
                                    <div>Validade <strong></strong></div>
                                </div>
                            </div>
                            
                            <button class="add-card-btn">
                                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                Adicionar Cartão
                            </button>
                        </div>
                    </div>

                    <div id="tab-historico" class="tab-content">
                        <h2 class="section-title">O Meu Histórico</h2>
                        
                        <div class="history-list"></div>
                    </div>

                </section>
            </div>
        </main>

        <script src="../../src/scripts/user/profile-01.js"></script>
        <link rel="stylesheet" href="../../src/styles/components/toast.css" />
        <link rel="stylesheet" href="../../src/styles/components/skeleton.css" />
        <script src="../../src/scripts/page-data.bootstrap.js"></script>
    </body>
</html>
