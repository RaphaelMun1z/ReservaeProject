<!doctype html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Tour - Criar Conta</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#ff624d', dark: '#e04c38' },
                        dark: { bg: '#050505', card: '#101010', border: '#242424', hover: '#1a1a1a' }
                    }
                }
            }
        }
    </script>
    <style>
        body::before {
            content: ""; position: fixed; inset: 0; opacity: 0.03;
            background-image: repeating-radial-gradient(circle at 0 0, #fff 0, #fff 1px, transparent 1px, transparent 4px);
            pointer-events: none; z-index: 50;
        }
        .glow-bg { animation: pulse-glow 6s ease-in-out infinite; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.15; transform: scale(0.95) translate(-50%, -50%); }
            50% { opacity: 0.25; transform: scale(1.05) translate(-50%, -50%); }
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-100 font-sans antialiased min-h-screen flex flex-col selection:bg-brand selection:text-white relative">

    <header class="absolute top-0 left-0 w-full z-40 px-8 py-6 flex justify-between items-center">
        <a href="index.html" class="inline-flex items-center justify-center w-12 h-12 bg-brand rounded-full text-white font-black text-xl tracking-tighter shadow-[0_0_15px_rgba(255,98,77,0.3)] hover:scale-105 transition-transform">
            tkts
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center relative z-10 px-6 py-20">
        <div class="absolute top-1/2 left-1/2 w-[400px] h-[400px] bg-brand/20 rounded-full blur-[120px] pointer-events-none glow-bg transform -translate-x-1/2 -translate-y-1/2 origin-top-left"></div>

        <div class="w-full max-w-lg bg-dark-card/80 backdrop-blur-xl border border-dark-border rounded-3xl p-8 sm:p-10 shadow-2xl relative">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-white mb-2 tracking-tight">Crie sua Conta</h1>
                <p class="text-sm font-medium text-gray-400">Garanta seus ingressos para os melhores eventos.</p>
            </div>

            <form class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Nome Completo</label>
                    <div class="relative">
                        <i class="ph-bold ph-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                        <input type="text" placeholder="Ex: Raphael Muniz" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">E-mail</label>
                        <div class="relative">
                            <i class="ph-bold ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                            <input type="email" placeholder="seu@email.com" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">CPF</label>
                        <div class="relative">
                            <i class="ph-bold ph-identification-card absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                            <input type="text" placeholder="000.000.000-00" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Senha</label>
                        <div class="relative">
                            <i class="ph-bold ph-lock-key absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                            <input type="password" placeholder="••••••••" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Confirmar Senha</label>
                        <div class="relative">
                            <i class="ph-bold ph-check-circle absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                            <input type="password" placeholder="••••••••" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600">
                        </div>
                    </div>
                </div>

                <label class="flex items-start gap-3 cursor-pointer group mt-6 text-sm">
                    <input type="checkbox" class="w-5 h-5 rounded border-dark-border bg-dark-bg mt-0.5 text-brand focus:ring-brand cursor-pointer accent-brand">
                    <span class="font-medium text-gray-400 leading-snug">
                        Li e concordo com os <a href="#" class="text-white hover:text-brand transition-colors font-bold">Termos de Uso</a> e a <a href="#" class="text-white hover:text-brand transition-colors font-bold">Política de Privacidade</a>.
                    </span>
                </label>

                <button type="submit" class="w-full bg-brand hover:bg-brand-dark text-white py-4 rounded-xl font-bold transition-all shadow-[0_10px_20px_rgba(255,98,77,0.2)] mt-6">
                    Finalizar Cadastro
                </button>
            </form>

            <div class="mt-8 text-center text-sm font-semibold text-gray-400">
                Já possui uma conta? 
                <a href="login.html" class="text-white hover:text-brand transition-colors ml-1">Fazer login</a>
            </div>
        </div>
    </main>

</body>
</html>
