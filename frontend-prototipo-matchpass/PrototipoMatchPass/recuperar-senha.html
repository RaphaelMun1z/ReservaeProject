<!doctype html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Tour - Recuperar Senha</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        brand: { DEFAULT: '#ff624d', dark: '#e04c38' },
                        dark: { bg: '#050505', card: '#101010', border: '#242424', hover: '#1a1a1a' }
                    }
                }
            }
        }
    </script>
    <style>
        body::before {
            content: ""; position: fixed; inset: 0; opacity: 0.03;
            background-image: repeating-radial-gradient(circle at 0 0, #fff 0, #fff 1px, transparent 1px, transparent 4px);
            pointer-events: none; z-index: 50;
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-100 font-sans antialiased min-h-screen flex flex-col selection:bg-brand selection:text-white relative">

    <header class="absolute top-0 left-0 w-full z-40 px-8 py-6 flex justify-between items-center">
        <a href="index.html" class="inline-flex items-center justify-center w-12 h-12 bg-brand rounded-full text-white font-black text-xl tracking-tighter shadow-[0_0_15px_rgba(255,98,77,0.3)] hover:scale-105 transition-transform">
            tkts
        </a>
    </header>

    <main class="flex-1 flex items-center justify-center relative z-10 px-6 py-20">
        <div class="w-full max-w-md bg-dark-card/80 backdrop-blur-xl border border-dark-border rounded-3xl p-8 sm:p-10 shadow-2xl relative text-center">
            
            <div class="w-20 h-20 bg-dark-hover border border-dark-border rounded-full flex items-center justify-center mx-auto mb-6 text-gray-400">
                <i class="ph-duotone ph-key text-4xl"></i>
            </div>

            <h1 class="text-2xl font-black text-white mb-2 tracking-tight">Esqueceu sua senha?</h1>
            <p class="text-sm font-medium text-gray-400 mb-8 leading-relaxed">
                Sem problemas! Informe o e-mail cadastrado e enviaremos um link seguro para você redefinir sua senha.
            </p>

            <form class="space-y-5 text-left">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">E-mail Cadastrado</label>
                    <div class="relative">
                        <i class="ph-bold ph-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-lg"></i>
                        <input type="email" placeholder="seu@email.com" class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 pl-11 pr-4 text-white focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-colors placeholder-gray-600">
                    </div>
                </div>

                <button type="submit" class="w-full bg-white text-black hover:bg-gray-200 py-4 rounded-xl font-bold transition-all mt-4 flex items-center justify-center gap-2">
                    <i class="ph-bold ph-paper-plane-right text-lg"></i>
                    Enviar Link de Recuperação
                </button>
            </form>

            <div class="mt-8">
                <a href="login.html" class="inline-flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-white transition-colors">
                    <i class="ph-bold ph-arrow-left text-lg"></i> Voltar para o Login
                </a>
            </div>
        </div>
    </main>

</body>
</html>
